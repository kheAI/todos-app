<template name="mainContainer">
    <main class="container">
      <article>
        <header>
          <hgroup>
            <h1>📝️ Todo List</h1>
          </hgroup>
        </header>
        {{> form }} 
        <ul style="list-style: none; padding: 0;">
          {{#each tasks}} 
              {{> task}}
          {{/each}}
        </ul>
      </article>
    </main>
  </template>
  
  <template name="task">
      <li>{{text}}</li>
  </template>

  <template name="form">
    <form class="task-form">
      <fieldset role="group">
        <input type="text" name="text" placeholder="Type to add new tasks" required />
        <input type="submit" value="Add" />
      </fieldset>
    </form>
  </template>
